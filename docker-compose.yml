services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
